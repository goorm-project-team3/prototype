<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GooRoom - 로그인</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>GooRoom</h1>
      <p class="subtitle">학습 특화 Web IDE</p>
      
      <form onsubmit="event.preventDefault(); location.href='dashboard.html';">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" placeholder="name@example.com" value="instructor@gooroom.dev">
        </div>
        
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" placeholder="••••••••" value="password123">
        </div>
        
        <button type="submit" class="btn-primary">로그인</button>
      </form>
      
      <div class="auth-footer">
        계정이 없으신가요? <a href="signup.html">회원가입</a>
      </div>
    </div>
  </div>
</body>
</html>
