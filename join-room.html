<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GooRoom - 강의실 참가하기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="form-page">
    <header class="topbar">
      <a href="dashboard.html" class="back-link">← 뒤로가기</a>
      <div class="logo">◈ GooRoom</div>
    </header>
    
    <main class="form-container">
      <h2>강의실 참가하기</h2>
      
      <form onsubmit="event.preventDefault(); location.href='room.html';">
        <div class="form-group">
          <label>참가 코드 또는 링크</label>
          <input type="text" placeholder="예: GR-7X9K2M">
        </div>
        
        <div style="text-align: center; margin: var(--space-5) 0; color: var(--v-text-muted);">또는</div>
        
        <div class="form-group">
          <label>공개 강의실 목록</label>
          <div style="border: 1px solid var(--v-border); border-radius: var(--radius-md); max-height: 240px; overflow-y: auto; background: var(--v-surface);">
            <div class="room-list-item">
              <div>
                <div style="font-weight: 700; color: var(--v-text); font-size: 14px;">타입스크립트 특강</div>
                <div style="font-size: 12px; color: var(--v-text-muted); margin-top: 2px;">25명 참여중 · 박강사</div>
              </div>
              <button type="button" class="btn-primary" style="padding: 6px 14px; font-size: 12px;">참가</button>
            </div>
            <div class="room-list-item">
              <div>
                <div style="font-weight: 700; color: var(--v-text); font-size: 14px;">Python 데이터 분석 기초</div>
                <div style="font-size: 12px; color: var(--v-text-muted); margin-top: 2px;">18명 참여중 · 이강사</div>
              </div>
              <button type="button" class="btn-primary" style="padding: 6px 14px; font-size: 12px;">참가</button>
            </div>
            <div class="room-list-item">
              <div>
                <div style="font-weight: 700; color: var(--v-text); font-size: 14px;">Next.js 풀스택 개발</div>
                <div style="font-size: 12px; color: var(--v-text-muted); margin-top: 2px;">32명 참여중 · 최강사</div>
              </div>
              <button type="button" class="btn-primary" style="padding: 6px 14px; font-size: 12px;">참가</button>
            </div>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="location.href='dashboard.html'">취소</button>
          <button type="submit" class="btn-primary">참가하기</button>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
