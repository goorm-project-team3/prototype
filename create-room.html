<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GooRoom - 강의실 만들기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="form-page">
    <header class="topbar">
      <a href="dashboard.html" class="back-link">← 뒤로가기</a>
      <div class="logo">◈ GooRoom</div>
    </header>
    
    <main class="form-container">
      <h2>새 강의실 만들기</h2>
      
      <form onsubmit="event.preventDefault(); location.href='room.html';">
        <div class="form-group">
          <label>강의실 이름</label>
          <input type="text" placeholder="예: React 심화 스터디" value="새로운 강의실">
        </div>
        
        <div class="form-group">
          <label>설명</label>
          <textarea rows="3" placeholder="강의실에 대한 간단한 설명을 입력하세요"></textarea>
        </div>
        
        <div class="form-group">
          <label>공개 설정</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="visibility" value="public" checked>
              <span>공개 (누구나 참가 가능)</span>
            </label>
          </div>
          <div class="radio-group" style="margin-top: var(--space-2);">
            <label class="radio-option">
              <input type="radio" name="visibility" value="private">
              <span>비공개 (참가 코드 필요)</span>
            </label>
          </div>
        </div>
        
        <div class="form-group">
          <label>참가 코드</label>
          <input type="text" value="GR-7X9K2M" readonly style="background: var(--v-surface-raised); color: var(--v-text-muted);">
          <span style="font-size: 12px; color: var(--v-text-muted); margin-top: var(--space-1); display: block;">비공개 설정 시 학생들에게 이 코드를 공유하세요.</span>
        </div>
        
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="location.href='dashboard.html'">취소</button>
          <button type="submit" class="btn-primary">강의실 생성</button>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
